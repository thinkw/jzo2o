#################     服务器配置     #################
server:
  port: 11511
  undertow:
    accesslog:
      enabled: true
      pattern: "%t %a &quot;%r&quot; %s (%D ms)"
      dir: /data/logs/undertow/${spring.application.name}/access-logs/
  servlet:
    context-path: /ai

#################     spring公共配置     #################
spring:
  mvc:
    path-match:
      matching-strategy: ant_path_matcher
    format:
      date: yyyy-MM-dd HH:mm:ss
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  profiles:
    active: dev
  application:
    name: jzo2o-ai
  main:
    # 支持循环依赖注入
    allow-circular-references: true
    # bean名相同覆盖
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR}
      discovery:
        namespace: ${NACOS_NAMESPACE}
      config:
        namespace: ${NACOS_NAMESPACE}
        file-extension: yaml
        shared-configs: # 共享配置
          - data-id: shared-redis-cluster.yaml # 共享redis集群配置
            refresh: false
          - data-id: shared-mysql.yaml # mysql配置
            refresh: false

#################     项目独有配置     #################
mysql:
  db-name: jzo2o-ai
mybatis:
  mapper-locations: mapper/*.xml
  type-aliases-package: com.jzo2o.ai.mapper
swagger:
  enable: true
  package-path: com.jzo2o.ai.controller
  title: 家政服务-AI助手服务接口文档
  description: 用于AI智能助手对话管理
  contact-name: 传智教育·研究院
  contact-url: http://www.itcast.cn/
  contact-email: yjy@itcast.cn
  version: v1.0

# Python AI引擎配置
jzo2o:
  ai:
    engine:
      base-url: http://localhost:8000
      connect-timeout: 5000
      read-timeout: 120000

#################     日志配置     #################
logging:
  level:
    com.jzo2o: debug
feign:
  enable: true
